<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Identity Manager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem 0;
        }
        
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }
        
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .register-header h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.8rem;
        }
        
        .register-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .register-body {
            padding: 2rem;
        }
        
        .form-floating {
            margin-bottom: 1rem;
        }
        
        .form-floating .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .form-floating .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .form-floating .form-control.is-invalid {
            border-color: #dc3545;
        }
        
        .form-floating .form-control.is-valid {
            border-color: #198754;
        }
        
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 1rem;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .password-requirements {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        
        .password-requirements h6 {
            color: #6c757d;
            margin-bottom: 0.5rem;
        }
        
        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
            color: #6c757d;
        }
        
        .requirement.valid {
            color: #198754;
        }
        
        .requirement.invalid {
            color: #dc3545;
        }
        
        .requirement i {
            margin-right: 0.5rem;
            font-size: 0.75rem;
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e9ecef;
        }
        
        .divider span {
            background: white;
            padding: 0 1rem;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .social-register {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .btn-social {
            flex: 1;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .btn-google {
            background: #fff;
            color: #333;
            border: 2px solid #e9ecef;
        }
        
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #dee2e6;
        }
        
        .btn-facebook {
            background: #1877f2;
            color: white;
            border: none;
        }
        
        .btn-facebook:hover {
            background: #166fe5;
            color: white;
        }
        
        .login-link {
            text-align: center;
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            color: #764ba2;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            z-index: 10;
        }
        
        .password-toggle:hover {
            color: #667eea;
        }
        
        .loading {
            display: none;
        }
        
        .loading.show {
            display: inline-block;
        }
        
        .name-row {
            display: flex;
            gap: 1rem;
        }
        
        .name-row .form-floating {
            flex: 1;
        }
        
        @media (max-width: 576px) {
            .register-container {
                margin: 1rem;
                border-radius: 15px;
            }
            
            .register-header {
                padding: 1.5rem;
            }
            
            .register-body {
                padding: 1.5rem;
            }
            
            .name-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="register-container">
                    <!-- Header -->
                    <div class="register-header">
                        <h2><i class="bi bi-person-plus me-2"></i>Create Account</h2>
                        <p>Join us and start your journey</p>
                    </div>
                    
                    <!-- Register Form -->
                    <div class="register-body">
                        <!-- Alert for messages -->
                        <div class="alert alert-danger d-none" id="errorAlert" role="alert">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span id="errorMessage"></span>
                        </div>
                        
                        <div class="alert alert-success d-none" id="successAlert" role="alert">
                            <i class="bi bi-check-circle me-2"></i>
                            <span id="successMessage"></span>
                        </div>
                        
                        <form id="registerForm">
                            <!-- Name Fields -->
                            <div class="name-row">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                                    <label for="firstName">First Name</label>
                                </div>
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                                    <label for="lastName">Last Name</label>
                                </div>
                            </div>
                            
                            <!-- Email Field -->
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                                <label for="email">Email address</label>
                            </div>
                            
                            <!-- Password Field -->
                            <div class="form-floating position-relative">
                                <input type="password" class="form-control" id="password" placeholder="Password" required>
                                <label for="password">Password</label>
                                <button type="button" class="password-toggle" id="passwordToggle">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            
                            <!-- Password Requirements -->
                            <div class="password-requirements">
                                <h6><i class="bi bi-shield-check me-1"></i>Password Requirements</h6>
                                <div class="requirement" id="req-length">
                                    <i class="bi bi-circle"></i>
                                    At least 8 characters
                                </div>
                                <div class="requirement" id="req-uppercase">
                                    <i class="bi bi-circle"></i>
                                    One uppercase letter
                                </div>
                                <div class="requirement" id="req-lowercase">
                                    <i class="bi bi-circle"></i>
                                    One lowercase letter
                                </div>
                                <div class="requirement" id="req-digit">
                                    <i class="bi bi-circle"></i>
                                    One number
                                </div>
                                <div class="requirement" id="req-special">
                                    <i class="bi bi-circle"></i>
                                    One special character
                                </div>
                            </div>
                            
                            <!-- Confirm Password Field -->
                            <div class="form-floating position-relative">
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                                <label for="confirmPassword">Confirm Password</label>
                                <button type="button" class="password-toggle" id="confirmPasswordToggle">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            
                            <!-- Terms and Conditions -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                            
                            <!-- Register Button -->
                            <button type="submit" class="btn btn-primary btn-register" id="registerBtn">
                                <span class="loading" id="registerLoading">
                                    <i class="bi bi-arrow-clockwise spin"></i>
                                </span>
                                <i class="bi bi-person-plus me-2"></i>Create Account
                            </button>
                        </form>
                        
                        <!-- Divider -->
                        <div class="divider">
                            <span>or sign up with</span>
                        </div>
                        
                        <!-- Social Register -->
                        <div class="social-register">
                            <button class="btn btn-social btn-google">
                                <i class="bi bi-google me-2"></i>Google
                            </button>
                            <button class="btn btn-social btn-facebook">
                                <i class="bi bi-facebook me-2"></i>Facebook
                            </button>
                        </div>
                        
                        <!-- Login Link -->
                        <div class="login-link">
                            Already have an account? <a href="login.html">Sign in</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // API Configuration
        const API_BASE_URL = 'https://localhost:7001/api';
        
        // Password toggle functionality
        document.getElementById('passwordToggle').addEventListener('click', function() {
            togglePasswordVisibility('password', this);
        });
        
        document.getElementById('confirmPasswordToggle').addEventListener('click', function() {
            togglePasswordVisibility('confirmPassword', this);
        });
        
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
        
        // Password validation
        document.getElementById('password').addEventListener('input', function() {
            validatePassword(this.value);
        });
        
        document.getElementById('confirmPassword').addEventListener('input', function() {
            validatePasswordMatch();
        });
        
        function validatePassword(password) {
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                digit: /\d/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };
            
            // Update requirement indicators
            Object.keys(requirements).forEach(req => {
                const element = document.getElementById(`req-${req}`);
                const icon = element.querySelector('i');
                
                if (requirements[req]) {
                    element.classList.remove('invalid');
                    element.classList.add('valid');
                    icon.classList.remove('bi-circle');
                    icon.classList.add('bi-check-circle');
                } else {
                    element.classList.remove('valid');
                    element.classList.add('invalid');
                    icon.classList.remove('bi-check-circle');
                    icon.classList.add('bi-circle');
                }
            });
            
            // Update password field styling
            const passwordField = document.getElementById('password');
            const isValid = Object.values(requirements).every(req => req);
            
            passwordField.classList.remove('is-valid', 'is-invalid');
            if (password.length > 0) {
                passwordField.classList.add(isValid ? 'is-valid' : 'is-invalid');
            }
        }
        
        function validatePasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const confirmField = document.getElementById('confirmPassword');
            
            confirmField.classList.remove('is-valid', 'is-invalid');
            
            if (confirmPassword.length > 0) {
                if (password === confirmPassword && password.length >= 8) {
                    confirmField.classList.add('is-valid');
                } else {
                    confirmField.classList.add('is-invalid');
                }
            }
        }
        
        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // Hide any existing alerts
            hideAlerts();
            
            // Validation
            if (!firstName || !lastName || !email || !password || !confirmPassword) {
                showError('Please fill in all fields.');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }
            
            if (!isValidPassword(password)) {
                showError('Password does not meet requirements.');
                return;
            }
            
            if (!agreeTerms) {
                showError('Please agree to the Terms of Service and Privacy Policy.');
                return;
            }
            
            // Show loading state
            const registerBtn = document.getElementById('registerBtn');
            const registerLoading = document.getElementById('registerLoading');
            registerBtn.disabled = true;
            registerLoading.classList.add('show');
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        firstName: firstName,
                        lastName: lastName,
                        email: email,
                        password: password,
                        confirmPassword: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.isSuccess) {
                    showSuccess('Registration successful! Please check your email to confirm your account.');
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                    
                    // Redirect to login after a delay
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showError(data.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('Network error. Please check your connection and try again.');
            } finally {
                // Reset loading state
                registerBtn.disabled = false;
                registerLoading.classList.remove('show');
            }
        });
        
        // Utility functions
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        function isValidPassword(password) {
            return password.length >= 8 &&
                   /[A-Z]/.test(password) &&
                   /[a-z]/.test(password) &&
                   /\d/.test(password) &&
                   /[!@#$%^&*(),.?":{}|<>]/.test(password);
        }
        
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorAlert.classList.remove('d-none');
        }
        
        function showSuccess(message) {
            const successAlert = document.getElementById('successAlert');
            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = message;
            successAlert.classList.remove('d-none');
        }
        
        function hideAlerts() {
            document.getElementById('errorAlert').classList.add('d-none');
            document.getElementById('successAlert').classList.add('d-none');
        }
        
        // Add spinning animation for loading icons
        const style = document.createElement('style');
        style.textContent = `
            .spin {
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
